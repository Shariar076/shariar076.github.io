<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 370" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="360" height="370" fill="#ffffff"/>
  <text x="180" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Constraint satisfaction: a Hidato path</text>

  <!-- the consecutive-number path (constraint: n must touch n+1) -->
  <polyline points="75,85 145,85 215,85 285,85 285,155 215,155 145,155 75,155 75,225 145,225 215,225 285,225 285,295 215,295 145,295 75,295"
            fill="none" stroke="#3b82f6" stroke-width="7" stroke-linejoin="round" stroke-linecap="round" opacity="0.30"/>

  <!-- grid cells -->
  <g fill="none" stroke="#cbd5e1" stroke-width="1.5">
    <rect x="40" y="50" width="70" height="70" rx="4"/>
    <rect x="110" y="50" width="70" height="70" rx="4"/>
    <rect x="180" y="50" width="70" height="70" rx="4"/>
    <rect x="250" y="50" width="70" height="70" rx="4"/>
    <rect x="40" y="120" width="70" height="70" rx="4"/>
    <rect x="110" y="120" width="70" height="70" rx="4"/>
    <rect x="180" y="120" width="70" height="70" rx="4"/>
    <rect x="250" y="120" width="70" height="70" rx="4"/>
    <rect x="40" y="190" width="70" height="70" rx="4"/>
    <rect x="110" y="190" width="70" height="70" rx="4"/>
    <rect x="180" y="190" width="70" height="70" rx="4"/>
    <rect x="250" y="190" width="70" height="70" rx="4"/>
    <rect x="40" y="260" width="70" height="70" rx="4"/>
    <rect x="110" y="260" width="70" height="70" rx="4"/>
    <rect x="180" y="260" width="70" height="70" rx="4"/>
    <rect x="250" y="260" width="70" height="70" rx="4"/>
  </g>

  <!-- numbers -->
  <g font-size="20" font-weight="600" fill="#1f2937" text-anchor="middle">
    <text x="75" y="92">1</text>
    <text x="145" y="92">2</text>
    <text x="215" y="92">3</text>
    <text x="285" y="92">4</text>
    <text x="75" y="162">8</text>
    <text x="145" y="162">7</text>
    <text x="215" y="162">6</text>
    <text x="285" y="162">5</text>
    <text x="75" y="232">9</text>
    <text x="145" y="232">10</text>
    <text x="215" y="232">11</text>
    <text x="285" y="232">12</text>
    <text x="75" y="302">16</text>
    <text x="145" y="302">15</text>
    <text x="215" y="302">14</text>
    <text x="285" y="302">13</text>
  </g>

  <text x="180" y="356" text-anchor="middle" font-size="11" fill="#6b7280">Fill 1&#8230;n so each number is adjacent to the next</text>
</svg>
